<section class="grid gap-6 lg:grid-cols-[1.05fr_0.95fr]">
    <div class="section-card">
        <div class="eyebrow">{{ intro_eyebrow }}</div>
        <h1 class="mt-3 font-serif text-5xl tracking-tight text-earth-900">{{ intro_title }}</h1>
        <p class="mt-5 max-w-2xl text-lg leading-8 text-base-content/75">
            {{ intro_text }}
        </p>
        <div class="mt-8 grid gap-5 sm:grid-cols-2">
            {{ contact_details }}
                <div>
                    <div class="eyebrow">{{ label }}</div>
                    <p class="mt-2 text-base-content/75">{{ value | nl2br }}</p>
                </div>
            {{ /contact_details }}
        </div>
    </div>

    <div class="grid gap-6">
        <div class="section-card bg-[linear-gradient(135deg,rgba(56,71,52,0.12),rgba(255,255,255,0.9))]">
            <div class="eyebrow">{{ discovery_eyebrow }}</div>
            <p class="mt-4 text-base-content/75">
                {{ discovery_text }}
            </p>
        </div>
        <div class="section-card">
            <div class="eyebrow">За госте</div>
            <ul class="mt-4 space-y-3 text-base-content/75">
                {{ guest_notes }}
                    <li>{{ text }}</li>
                {{ /guest_notes }}
            </ul>
        </div>
    </div>
</section>

<section class="mt-6 grid gap-6 md:grid-cols-3">
    {{ gallery_images }}
        <figure class="photo-card aspect-[0.95] {{ if index == 0 }}md:col-span-2{{ /if }}">
            <img
                src="{{ image_url }}"
                alt="{{ alt }}"
                loading="lazy"
                decoding="async"
            >
            <figcaption class="photo-caption">{{ caption }}</figcaption>
        </figure>
    {{ /gallery_images }}
</section>
